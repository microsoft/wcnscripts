apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: stop-tcp-pktmon-cap
  labels:
    app: stop-tcp-pktmon-cap
spec:
  selector:
    matchLabels:
      name: stop-tcp-pktmon-cap
  template:
    metadata:
      labels:
        name: stop-tcp-pktmon-cap
    spec:
      securityContext:
        windowsOptions:
          hostProcess: true
          runAsUserName: "NT AUTHORITY\\SYSTEM"
      hostNetwork: true
      containers:
      - name: stop-tcp-pktmon-cap
        image: mcr.microsoft.com/dotnet/framework/samples:aspnetapp
        command:
        - powershell.exe
        - -command
        - |
            $pktmonLogs = "C:\pktmonLogs"
            Start-Sleep -Seconds 5
            Write-Host "Stop pktmon..."
            pktmon stop

            Write-Host "Logs will be available in $pktmonLogs"
            
            While($true) {
              Start-Sleep -Seconds 120
            }

        securityContext:
          privileged: true
      nodeSelector:
        kubernetes.azure.com/os-sku: Windows2022